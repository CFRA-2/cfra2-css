name: GitHub Deployment Marker

on:
  push:
    branches: [main]

jobs:
  mark-deployed:
    runs-on: ubuntu-latest
    permissions:
      deployments: write
    steps:
      - name: Create GitHub Deployment and mark success
        uses: actions/github-script@v7
        with:
          script: |
            const dep = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              description: 'CSS package published to npm',
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: dep.data.id,
              state: 'success',
              description: context.sha.slice(0, 7),
              log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
